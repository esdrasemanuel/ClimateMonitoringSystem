syntax = "proto3";

option java_multiple_files = true;
option java_package = "com.esdras.river";
option java_outer_classname = "RiverLevelProto";

package river;


service RiverLevelService {

  // 1. Simple RPC
  rpc getCurrentRiverLevel(RiverRequest) returns (RiverResponse);

  // 2. Client Streaming RPC
  rpc uploadRainfallData(stream RainfallData) returns (RainfallAnalysis);

  // 3. Bidirectional Streaming RPC
  rpc monitorRiverLevelLive(stream RiverRequestBidi) returns (stream RiverResponse);
}

message RiverRequest {
  string location = 1;
}

message RiverResponse {
  double riverLevel = 1;
  string riskStatus = 2;
  string timestamp = 3;
}

message RainfallData {
  string location = 1;
  double rainfallAmount = 2; 
}

message RainfallAnalysis {
  double averageRainfall = 1;
  string floodRiskIndicator = 2;
}

message RiverRequestBidi {
  string location = 1;
  double riverLevel = 2;
}